name: server
on: workflow_dispatch
jobs:
  server:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Install dependencies
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt update
          sudo apt install -y libltdl-dev wrk gcc-15 iotop
      - name: Install libreactorng
        run: |
          git clone https://github.com/fredrikwidlund/libreactorng.git
          cd libreactorng
          ./autogen.sh
          CC=gcc-15 ./configure
          make
          sudo make install
          sudo ldconfig
      - name: Performance
        run: |
          cd libreactorng/example
          gcc-15 server.c -lreactor -o server
          sudo ./server &
          sleep 60
          sudo iotop -b -o -t -d 3 &
          wrk -t1 -c1 -d1m http://127.0.0.1:80/
