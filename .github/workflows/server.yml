name: server
on: workflow_dispatch
jobs:
  server:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Install libreactorng
        run: |
          git clone https://github.com/fredrikwidlund/libreactorng.git
          cd libreactorng
          ./autogen.sh
          ./configure
          make
          sudo make install
