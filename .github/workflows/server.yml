name: server
on: workflow_dispatch
jobs:
  server:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Install dependencies
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt update
          sudo apt install -y libltdl-dev gcc-15
      - name: Install libreactorng
        run: |
          git clone https://github.com/fredrikwidlund/libreactorng.git
          cd libreactorng
          ./autogen.sh
          CC=gcc-15 ./configure
          make
          sudo make install
          sudo ldconfig
      - name: Performance
        run: |
          cd libreactorng/example
          gcc-15 server.c -lreactor -o server
          sudo ./server &
          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64
          chmod +x cloudflared-linux-arm64
          awk 'BEGIN { while(1) { while((getline < "/proc/stat")>0) { if($1 ~ /^cpu[0-9]+$/) { c=substr($1,4)+1; id=$5; tot=0; for(i=2;i<=NF;i++) tot+=$i; if(pt[c] && tot>pt[c]) printf "Ядро %d: %.0f%%\n", c, 100*(1-(id-pi[c])/(tot-pt[c])); pi[c]=id; pt[c]=tot } } close("/proc/stat"); print "---"; fflush(); system("sleep 5") } }' &
          ./cloudflared-linux-arm64 tunnel --url http://127.0.0.1:80
