name: server
on: workflow_dispatch
jobs:
  server:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Cloudflare
        run: |
          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64
          chmod +x cloudflared-linux-arm64
          awk 'BEGIN { while(1) { while((getline < "/proc/stat")>0) { if($1 ~ /^cpu[0-9]+$/) { c=substr($1,4)+1; id=$5; tot=0; for(i=2;i<=NF;i++) tot+=$i; if(pt[c] && tot>pt[c]) printf "Ядро %d: %.0f%%\n", c, 100*(1-(id-pi[c])/(tot-pt[c])); pi[c]=id; pt[c]=tot } } close("/proc/stat"); print "---"; fflush(); system("sleep 1") } }' &
          ./cloudflared-linux-arm64 tunnel --url http://localhost:8080
