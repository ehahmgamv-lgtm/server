name: bench
on: workflow_dispatch
jobs:
  bench:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: bench
        run: |
          git clone https://boringssl.googlesource.com/boringssl
          cd boringssl
          mkdir build
          cd build
          cmake -GNinja ..
          ninja
          taskset -c 0 $(find . -name bssl -type f -executable | head -n 1) speed -filter AES
