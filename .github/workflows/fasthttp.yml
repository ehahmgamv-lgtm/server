name: Benchmark gnet
on: workflow_dispatch
jobs:
  benchmark:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Install wrk
        run: sudo apt-get update && sudo apt-get install -y wrk
      - name: Run gnet benchmark
        run: |
          cat << 'EOF' > main.go
          package main

          import "github.com/panjf2000/gnet/v2"

          type server struct {
              gnet.BuiltinEventEngine
          }

          var res = []byte("HTTP/1.1 200 OK\r\nContent-Length: 2\r\n\r\nOK")

          func (s *server) OnTraffic(c gnet.Conn) gnet.Action {
              c.Next(-1)
              c.Write(res)
              return gnet.None
          }

          func main() {
              gnet.Run(&server{}, "tcp://127.0.0.1:8080")
          }
          EOF
          
          go mod init bench
          go get github.com/panjf2000/gnet/v2
          go mod tidy
          go build -o server_bin main.go
          
          ./server_bin &
          sleep 3
          
          wrk -t 1 -c 1 -d 10s http://127.0.0.1:8080/
