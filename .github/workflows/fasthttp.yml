name: Benchmark gnet
on: [push, pull_request]
jobs:
  benchmark:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Install wrk
        run: sudo apt-get update && sudo apt-get install -y wrk
      - name: Create gnet server
        run: |
          cat << 'EOF' > main.go
          package main

          import (
              "github.com/panjf2000/gnet/v2"
          )

          type httpServer struct {
              gnet.BuiltinEventEngine
              res []byte
          }

          func (hs *httpServer) React(frame []byte, c gnet.Conn) (out []byte, action gnet.Action) {
              return hs.res, gnet.None
          }

          func main() {
              hs := &httpServer{
                  res: []byte("HTTP/1.1 200 OK\r\nContent-Length: 2\r\n\r\nOK"),
              }
              gnet.Run(hs, "tcp://127.0.0.1:8080", gnet.WithMulticore(true))
          }
          EOF
      - name: Prepare and run gnet server
        run: |
          go mod init bench
          go get github.com/panjf2000/gnet/v2
          go build -o server main.go
          ./server &
          sleep 2
      - name: Run wrk benchmark
        run: wrk -t 1 -c 1 -d 10s http://127.0.0.1:8080
